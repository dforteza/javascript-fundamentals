<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3</title>
</head>
<body>
    <h1>Inventario de frutas</h1>
    <h2>Recoger el texto de la caja mediante dos botones, añadir arriba o abajo según se requiera</h2>
    <label for="texto">Fruta a añadir     Nombre de fruta</label>
    <input type="text" name="texto" id="texto">
    <input type="button" value="Añadir arriba" id="arriba">
    <input type="button" value="Añadir abajo" id="abajo">
    <ul id="inventario"></ul>


</body>

<script>
    /**
     * Recoger el texto de la caja mediante dos botones, añadir arriba o abajo según se requiera
     * 
     */
    function addUp()
    {
        const boxVal = box.value
        if (boxVal == "") {
            alert("Campo vacio")
            return
        }
        const row = document.createElement("li")
        row.textContent = boxVal
        lista.prepend(row)
        box.value = ""
    }

    function addDown()
    {
        const boxVal = box.value
        if (boxVal == "") {
            alert("Campo vacio")
            return
        }
        const row = document.createElement("li")
        row.textContent = boxVal
        lista.append(row)
        box.value = ""
    }

    // 1- Seleccionar Elementos
    const box = document.querySelector("#texto")
    const upButton = document.querySelector("#arriba")
    const downButton = document.querySelector("#abajo")
    const lista = document.querySelector("#inventario")

    // 2- Escuchar clic de cada boton
    upButton.addEventListener("click", addUp)
    downButton.addEventListener("click", addDown)
</script>
</html>
