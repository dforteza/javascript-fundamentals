<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4</title>
</head>
<body>
    <h1>Ejercicio 4</h1>
    <h2>validar que la persona y el email están correctos</h2>
    <h2>persona tiene nombre entre 5 y 40 letras</h2>
    <h2>email tiene @ .</h2>
    <h2>si están los datos OK, se añade a lista de personas</h2>
    <h2>Sino, alert con el error</h2> <br>

    Nombre<input type="text" name="nombre" id="nombre"><br>
    Email <input type="text" name="" id="email"> <br>
    <input type="button" value="Añadir">
    <ul id="personas"></ul>
</body>

<script>
    /**
     * validar que la persona y el email están correctos
     *      persona tiene nombre entre 5 y 40 letras
     *      email tiene @ y .
     *      si están los datos OK, se añade a lista de personas
     *      Sino, alert con el error
     */

    function validations(e)
    {
        e.preventDefault()  // ← evita el recargado de la página

        const nombreVal = nb.value
        const mailVal = mail.value

        // Validar nombre (entre 5 y 40 caracteres)
        if (nombreVal.length < 5 || nombreVal.length > 40) {
            alert("El nombre debe tener entre 5 y 40 caracteres")
            return
        }

        // Validar email (contiene @ y .)
        if (!mailVal.includes("@") || !mailVal.includes(".")) {
            alert("El email debe contener @ y .")
            return
        }

        // Todo OK → añadir a la lista
        const row = document.createElement("li")
        row.textContent = `${nombreVal} - ${mailVal}`
        lista.append(row)

        // Limpiar campos
        nb.value = ""
        mail.value = ""
    }

    // 1. Recoger campos
    const nb = document.querySelector("#nombre")
    const mail = document.querySelector("#email")
    const btnAdd = document.querySelector('input[type="button"]')
    const lista = document.querySelector("#personas")

    // 2. Escuchar clic
    btnAdd.addEventListener("click", validations)
</script>
</html>
